<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- 球体3D立体渐变 - 模拟球面弯曲光影 -->
    <radialGradient id="sphere3D" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#FFEE88"/>
      <stop offset="20%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#E6B800"/>
      <stop offset="80%" stop-color="#B38600"/>
      <stop offset="100%" stop-color="#805E00"/>
    </radialGradient>
    <!-- 强高光 - 模拟光源反射 -->
    <ellipse id="mainHighlight" cx="32" cy="28" rx="14" ry="10" fill="rgba(255,255,255,0.85)"/>
    <!-- 次高光 -->
    <ellipse id="subHighlight" cx="36" cy="32" rx="5" ry="3" fill="rgba(255,255,255,0.5)"/>
  </defs>

  <!-- 球体 - 立体渐变 -->
  <circle cx="50" cy="50" r="46" fill="url(#sphere3D)"/>
  
  <!-- 球体边缘阴影 -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>

  <!-- 强高光 - 左上角 -->
  <ellipse cx="32" cy="28" rx="14" ry="10" fill="rgba(255,255,255,0.75)"/>
  <!-- 次高光 -->
  <ellipse cx="36" cy="32" rx="5" ry="3" fill="rgba(255,255,255,0.4)"/>
  
  <!-- 底部微反光 -->
  <ellipse cx="50" cy="78" rx="25" ry="8" fill="rgba(255,255,200,0.2)"/>

  <!-- 白色圆圈 -->
  <circle cx="50" cy="50" r="42" fill="#f8f8f8"/>
  <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>

  <!-- 数字 -->
  <text x="50" y="78" font-family="Arial Black, Arial" font-size="80" font-weight="900" fill="#1a1a1a" text-anchor="middle">1</text>
</svg>
