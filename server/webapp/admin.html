<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统设置 - Claude Remote Control</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div id="admin-app">
    <div id="admin-header">
      <h1>系统设置</h1>
      <a href="/app" class="back-link">返回终端</a>
    </div>

    <div id="admin-tabs">
      <button class="tab-btn active" data-tab="ai-agents">AI Agents</button>
      <button class="tab-btn" data-tab="server">服务器</button>
      <button class="tab-btn" data-tab="session">会话</button>
    </div>

    <!-- AI Agents Tab -->
    <div id="tab-ai-agents" class="tab-content active">
      <div class="section-header">
        <h2>AI Agent 管理</h2>
        <button id="add-agent-btn" class="primary-btn">+ 添加 Agent</button>
      </div>
      <div id="agents-list" class="agents-list">
        <!-- 动态加载 -->
      </div>
    </div>

    <!-- Server Tab -->
    <div id="tab-server" class="tab-content">
      <div class="section-header">
        <h2>服务器配置</h2>
      </div>
      <div class="config-form">
        <div class="form-group">
          <label>监听地址</label>
          <input type="text" id="server-host" readonly>
        </div>
        <div class="form-group">
          <label>HTTP 端口</label>
          <input type="text" id="server-port" readonly>
        </div>
        <div class="form-group">
          <label>HTTPS 端口</label>
          <input type="text" id="server-https-port" readonly>
        </div>
        <div class="form-group">
          <label>认证 Token</label>
          <div class="input-with-action">
            <input type="password" id="server-token" readonly>
            <button class="icon-btn" id="toggle-token" title="显示/隐藏">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label>认证密码</label>
          <div class="input-with-action">
            <input type="password" id="auth-password" readonly>
            <button class="icon-btn" id="toggle-password" title="显示/隐藏">👁</button>
          </div>
        </div>
        <p class="form-hint">服务器配置需在 config.json 中修改，修改后需重启服务生效</p>
      </div>
    </div>

    <!-- Session Tab -->
    <div id="tab-session" class="tab-content">
      <div class="section-header">
        <h2>会话配置</h2>
      </div>
      <div class="config-form">
        <div class="form-group">
          <label>最大历史记录数</label>
          <input type="number" id="max-history" readonly>
        </div>
        <div class="form-group">
          <label>会话超时 (毫秒)</label>
          <input type="number" id="session-timeout" readonly>
        </div>
        <p class="form-hint">会话配置需在 config.json 中修改</p>
      </div>
    </div>

    <!-- Add/Edit Agent Modal -->
    <div id="agent-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-title">添加 AI Agent</h2>
          <button class="icon-btn close-modal">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="agent-name">显示名称 *</label>
            <input type="text" id="agent-name" placeholder="如: Claude">
          </div>
          <div class="form-group">
            <label for="agent-command">启动命令 *</label>
            <input type="text" id="agent-command" placeholder="如: claude">
          </div>
          <div class="form-group">
            <label for="agent-path">备用路径</label>
            <input type="text" id="agent-path" placeholder="如: C:\\Users\\xxx\\.local\\bin\\claude.exe">
            <small class="form-hint">当命令不在 PATH 中时使用的完整路径</small>
          </div>
        </div>
        <div class="modal-footer">
          <button id="save-agent-btn" class="primary-btn">保存</button>
          <button id="cancel-agent-btn" class="secondary-btn">取消</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>
  </div>

  <script type="module" src="/js/admin.js"></script>
</body>
</html>
