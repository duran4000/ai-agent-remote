<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Claude Remote Control</title>
  <!-- Web Font: 支持 Unicode 符号 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+Symbols+2&display=swap" rel="stylesheet">
  <!-- CSS: 主题 -> 基础 -> 组件 -> 特效 -> 模态框 -> 终端 -->
  <link rel="stylesheet" href="/css/themes/dark.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css?v=3">
  <link rel="stylesheet" href="/css/overlay.css">
  <link rel="stylesheet" href="/css/modal.css">
  <link rel="stylesheet" href="/css/xterm.css">
</head>
<body>
  <div id="auth-screen">
    <input type="password" id="auth-password" autocomplete="off" autocapitalize="off">
  </div>

  <div id="app" class="hidden">
    <div id="header">
      <div class="header-left">
        <span id="connection-status" class="status-dot disconnected" style="display: none;"></span>
        <span id="status-text" style="display: none;" data-i18n="status.notConnected">未连接</span>
      </div>
    </div>

    <div id="tabs-container">
      <div id="tabs-list"></div>
      <div class="tabs-actions">
        <button id="add-tab-btn" class="icon-btn" data-i18n-title="header.newTab" title="新建标签">+</button>
        <a href="/admin" class="icon-btn settings-btn" data-i18n-title="header.settings" title="系统设置">⚙</a>
      </div>
    </div>

    <div id="session-info">
      <div class="info-item">
        <span id="session-status-dot" class="status-dot disconnected"></span>
        <span id="session-status-text" class="info-label" data-i18n="status.disconnected">已断开</span>
      </div>
      <div class="info-item" id="latency-container" style="display: none;">
        <span id="latency-icon" class="info-icon">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
          </svg>
        </span>
        <span id="latency-value" class="info-value">-</span>
      </div>
      <div class="info-item" id="work-dir-container">
        <span class="info-icon work-dir-icon">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
            <path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
          </svg>
        </span>
        <span id="current-work-dir" class="info-value">-</span>
      </div>
    </div>

    <div id="terminal-container">
      <div id="terminal"></div>
      <div id="terminal-overlay" class="terminal-overlay">
        <div class="overlay-content">
          <div class="unlock-circle">
            <svg viewBox="0 0 120 120" class="rotating-circle">
              <circle cx="60" cy="60" r="54" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="8 6"/>
            </svg>
            <span class="overlay-text" data-i18n="status.disconnected">已断开</span>
          </div>
          <div class="ripple-container"></div>
        </div>
      </div>
    </div>

    <div id="input-area">
      <div id="input-wrapper">
        <input type="text" id="command-input" data-i18n="terminal.placeholder" placeholder="输入命令..." autocomplete="off" autocapitalize="off" disabled>
      </div>
      <div id="quick-actions">
        <div class="action-group frequently-used primary-row">
          <span class="action-btn action-btn-sm" data-action="esc" data-i18n-title="btn.esc" title="退出/取消">ESC</span>
          <span class="action-btn" data-action="num-1">1</span>
          <span class="action-btn" data-action="num-2">2</span>
          <span class="action-btn arrow" data-action="up" data-i18n-title="btn.prevCmd" title="上一条命令">↑</span>
          <span class="action-btn arrow" data-action="down" data-i18n-title="btn.nextCmd" title="下一条命令">↓</span>
          <span class="action-btn arrow arrow-h" data-action="left" data-i18n-title="btn.left" title="左移">←</span>
          <span class="action-btn arrow arrow-h" data-action="right" data-i18n-title="btn.right" title="右移">→</span>
          <span class="action-btn right-separator"></span>
          <span class="action-btn action-btn-wide" data-action="backspace" data-i18n-title="btn.backspace" title="退格">⌫</span>
          <span class="action-btn action-btn-wide" data-action="enter" data-i18n-title="btn.enter" title="回车">Enter</span>
        </div>
        <div class="action-group frequently-used secondary-row">
          <span class="action-btn" id="font-size-btn" data-i18n-title="btn.fontSize" title="调整字体">Aa</span>
          <span class="action-btn action-btn-sm" data-action="toggle-shortcuts" data-i18n-title="btn.more" title="展开更多">⌨️</span>
          <span class="action-btn" data-action="slash" data-i18n-title="btn.command" title="命令">/</span>
          <span class="action-btn" data-action="hash" data-i18n-title="btn.hash" title="注释">#</span>
          <span class="action-btn" data-action="at" data-i18n-title="btn.filePath" title="文件路径">@</span>
          <span class="action-btn" data-action="bash-mode" data-i18n-title="btn.bashMode" title="Bash模式">!</span>
        </div>
        <div class="action-group">
          <span class="action-btn" data-action="clear-screen" data-i18n="btn.clear" title="清屏">清屏</span>
          <span class="action-btn" data-action="tab" data-i18n-title="btn.tab" title="自动补全">TAB</span>
          <span class="action-btn" data-action="export-log" data-i18n-title="btn.exportLog" title="导出日志">导出</span>
          <span class="action-btn" data-action="search-terminal" data-i18n-title="btn.search" title="搜索">🔍</span>
        </div>
        <div class="action-group">
          <span class="action-btn" data-action="ctrl-c" data-i18n-title="btn.interrupt" title="中断">Ctrl+C</span>
          <span class="action-btn" data-action="ctrl-d" data-i18n-title="btn.exit" title="退出">Ctrl+D</span>
          <span class="action-btn" data-action="ctrl-o" data-i18n-title="btn.options" title="选项">Ctrl+O</span>
          <span class="action-btn" data-action="ctrl-z" data-i18n-title="btn.undo" title="撤销">Ctrl+Z</span>
        </div>
        <div class="action-group">
          <span class="action-btn" data-action="ctrl-t" data-i18n-title="btn.switchTask" title="切换任务">Ctrl+T</span>
          <span class="action-btn" data-action="ctrl-s" data-i18n-title="btn.save" title="暂存">Ctrl+S</span>
          <span class="action-btn" data-action="ctrl-g" data-i18n-title="btn.editor" title="编辑器">Ctrl+G</span>
        </div>
        <div class="action-group">
          <span class="action-btn" data-action="ctrl-shift-minus" data-i18n-title="btn.undo" title="撤销">Ctrl+Shift+-</span>
          <span class="action-btn" data-action="alt-v" data-i18n-title="btn.pasteImg" title="粘贴图片">Alt+V</span>
          <span class="action-btn" data-action="meta-p" data-i18n-title="btn.switchModel" title="切换模型">Meta+P</span>
          <span class="action-btn" data-action="meta-o" data-i18n-title="btn.fastMode" title="快速模式">Meta+O</span>
        </div>
        <div class="action-group">
          <span class="action-btn" data-action="shift-tab" data-i18n-title="btn.autoAccept" title="自动接受">Shift+Tab</span>
          <span class="action-btn" data-action="newline" data-i18n-title="btn.newline" title="换行">\\⏎</span>
        </div>
        <div class="action-group">
          <span class="action-btn" data-action="bash-mode" data-i18n-title="btn.bashMode" title="Bash模式">!</span>
          <span class="action-btn" data-action="slash" data-i18n-title="btn.command" title="命令">/</span>
          <span class="action-btn" data-action="at" data-i18n-title="btn.filePath" title="文件路径">@</span>
          <span class="action-btn" data-action="ampersand" data-i18n-title="btn.background" title="后台">&</span>
        </div>
        <div class="action-group numbers">
          <span class="action-btn" data-action="num-3">3</span>
          <span class="action-btn" data-action="num-4">4</span>
          <span class="action-btn" data-action="num-5">5</span>
          <span class="action-btn" data-action="num-6">6</span>
          <span class="action-btn" data-action="num-7">7</span>
          <span class="action-btn" data-action="num-8">8</span>
          <span class="action-btn" data-action="num-9">9</span>
        </div>
      </div>
    </div>

    <div id="settings-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2 data-i18n="settings.title">设置</h2>
          <button id="close-settings" class="icon-btn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="server-url" data-i18n="settings.serverUrl">服务器地址</label>
            <input type="text" id="server-url" placeholder="ws://localhost:41491">
          </div>
          <div class="form-group">
            <label for="auth-token" data-i18n="settings.authToken">认证Token</label>
            <input type="password" id="auth-token" data-i18n="settings.authTokenPlaceholder" placeholder="输入Token">
          </div>
          <div class="form-group">
            <label for="work-dir" data-i18n="settings.workDir">工作目录</label>
            <div class="work-dir-container">
              <input type="text" id="work-dir" data-i18n="settings.workDirPlaceholder" placeholder="如: E:/MyCode/python/my-project">
              <div id="work-dir-dropdown" class="work-dir-dropdown hidden">
              </div>
            </div>
            <div id="work-dir-validation" class="work-dir-validation hidden">
              <span class="validation-icon"></span>
              <span class="validation-message"></span>
            </div>
            <small class="form-hint" data-i18n="settings.workDirHint">AI Agent将在此目录下运行</small>
          </div>
          <div class="form-group inline-group">
            <label for="ai-model">AI Agent</label>
            <div class="custom-select narrow">
              <div class="custom-select-trigger" id="ai-model-trigger">
                <span id="ai-model-value">-</span>
                <span class="custom-select-arrow">▼</span>
              </div>
              <div class="custom-select-options hidden" id="ai-model-options">
              </div>
              <select id="ai-model" class="hidden">
              </select>
            </div>
            <label class="checkbox-label">
              <input type="checkbox" id="new-tab-checkbox" checked>
              <span data-i18n="settings.newTab">新建标签</span>
            </label>
          </div>
          <div class="form-group inline-group overlay-mode-group">
            <label data-i18n="settings.overlayMode">蒙版激活</label>
            <label class="radio-label">
              <input type="radio" name="overlay-click-mode" value="dblclick" checked>
              <span data-i18n="settings.doubleClick">双击</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="overlay-click-mode" value="click">
              <span data-i18n="settings.singleClick">单击</span>
            </label>
          </div>
        </div>
        <div class="modal-footer">
          <div class="modal-divider"></div>
          <button id="connect-btn" class="primary-btn full-width" data-i18n="settings.connect">连接</button>
          <button id="disconnect-btn" class="danger-btn full-width hidden" data-i18n="settings.disconnect">断开连接</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/xterm.min.js"></script>
  <script src="/js/xterm-addon-fit.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
