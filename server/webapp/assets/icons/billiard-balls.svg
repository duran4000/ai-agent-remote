<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <!-- 球体渐变 -->
    <radialGradient id="ballShine" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- 1号球 - 黄色实心 -->
    <g id="ball-1">
      <circle cx="50" cy="50" r="48" fill="#FFD700"/>
      <circle cx="50" cy="50" r="48" fill="url(#ballShine)"/>
      <circle cx="50" cy="50" r="38" fill="#f5f5f5"/>
      <text x="50" y="65" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1a1a1a" text-anchor="middle">1</text>
      <circle cx="50" cy="50" r="48" fill="none" stroke="#CC9900" stroke-width="2"/>
    </g>

    <!-- 2号球 - 蓝色实心 -->
    <g id="ball-2">
      <circle cx="50" cy="50" r="48" fill="#0066CC"/>
      <circle cx="50" cy="50" r="48" fill="url(#ballShine)"/>
      <circle cx="50" cy="50" r="38" fill="#f5f5f5"/>
      <text x="50" y="65" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1a1a1a" text-anchor="middle">2</text>
      <circle cx="50" cy="50" r="48" fill="none" stroke="#004080" stroke-width="2"/>
    </g>

    <!-- 3号球 - 红色实心 -->
    <g id="ball-3">
      <circle cx="50" cy="50" r="48" fill="#CC0000"/>
      <circle cx="50" cy="50" r="48" fill="url(#ballShine)"/>
      <circle cx="50" cy="50" r="38" fill="#f5f5f5"/>
      <text x="50" y="65" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1a1a1a" text-anchor="middle">3</text>
      <circle cx="50" cy="50" r="48" fill="none" stroke="#990000" stroke-width="2"/>
    </g>

    <!-- 4号球 - 紫色实心 -->
    <g id="ball-4">
      <circle cx="50" cy="50" r="48" fill="#660099"/>
      <circle cx="50" cy="50" r="48" fill="url(#ballShine)"/>
      <circle cx="50" cy="50" r="38" fill="#f5f5f5"/>
      <text x="50" y="65" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1a1a1a" text-anchor="middle">4</text>
      <circle cx="50" cy="50" r="48" fill="none" stroke="#400060" stroke-width="2"/>
    </g>

    <!-- 5号球 - 橙色实心 -->
    <g id="ball-5">
      <circle cx="50" cy="50" r="48" fill="#FF6600"/>
      <circle cx="50" cy="50" r="48" fill="url(#ballShine)"/>
      <circle cx="50" cy="50" r="38" fill="#f5f5f5"/>
      <text x="50" y="65" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1a1a1a" text-anchor="middle">5</text>
      <circle cx="50" cy="50" r="48" fill="none" stroke="#CC4400" stroke-width="2"/>
    </g>

    <!-- 6号球 - 绿色实心 -->
    <g id="ball-6">
      <circle cx="50" cy="50" r="48" fill="#009900"/>
      <circle cx="50" cy="50" r="48" fill="url(#ballShine)"/>
      <circle cx="50" cy="50" r="38" fill="#f5f5f5"/>
      <text x="50" y="65" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1a1a1a" text-anchor="middle">6</text>
      <circle cx="50" cy="50" r="48" fill="none" stroke="#006600" stroke-width="2"/>
    </g>

    <!-- 7号球 - 枣红实心 -->
    <g id="ball-7">
      <circle cx="50" cy="50" r="48" fill="#8B4513"/>
      <circle cx="50" cy="50" r="48" fill="url(#ballShine)"/>
      <circle cx="50" cy="50" r="38" fill="#f5f5f5"/>
      <text x="50" y="65" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1a1a1a" text-anchor="middle">7</text>
      <circle cx="50" cy="50" r="48" fill="none" stroke="#5C2E0E" stroke-width="2"/>
    </g>

    <!-- 8号球 - 黑色 -->
    <g id="ball-8">
      <circle cx="50" cy="50" r="48" fill="#1a1a1a"/>
      <circle cx="50" cy="50" r="48" fill="url(#ballShine)"/>
      <circle cx="50" cy="50" r="38" fill="#f5f5f5"/>
      <text x="50" y="65" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1a1a1a" text-anchor="middle">8</text>
      <circle cx="50" cy="50" r="48" fill="none" stroke="#0d0d0d" stroke-width="2"/>
    </g>

    <!-- 9号球 - 黄色条纹 -->
    <g id="ball-9">
      <circle cx="50" cy="50" r="48" fill="#f5f5f5"/>
      <path d="M 10,30 A 48,48 0 0,1 90,30 L 90,70 A 48,48 0 0,1 10,70 Z" fill="#FFD700"/>
      <circle cx="50" cy="50" r="48" fill="url(#ballShine)"/>
      <circle cx="50" cy="50" r="38" fill="#f5f5f5"/>
      <text x="50" y="65" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#1a1a1a" text-anchor="middle">9</text>
      <circle cx="50" cy="50" r="48" fill="none" stroke="#CC9900" stroke-width="2"/>
    </g>
  </defs>

  <!-- 布局展示所有球 -->
  <use href="#ball-1" x="0" y="0" width="100" height="100"/>
  <use href="#ball-2" x="100" y="0" width="100" height="100"/>
  <use href="#ball-3" x="200" y="0" width="100" height="100"/>
  <use href="#ball-4" x="0" y="100" width="100" height="100"/>
  <use href="#ball-5" x="100" y="100" width="100" height="100"/>
  <use href="#ball-6" x="200" y="100" width="100" height="100"/>
  <use href="#ball-7" x="0" y="200" width="100" height="100"/>
  <use href="#ball-8" x="100" y="200" width="100" height="100"/>
  <use href="#ball-9" x="200" y="200" width="100" height="100"/>
</svg>